<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/style.css" />
        <title>Weather App</title>
    </head>
    <body>
        <div class="wrapper">
            <section class="search">
                <input type="text" class="search__input" placeholder="Search" />
                <button class="search__button">
                    <img src="images/search-loupe.png" alt="loupe" />
                </button>
            </section>
            <section class="weather-information">
                <h2 class="weather-information__title">
                    Weather in London
                </h2>
                <h1 class="weather-information__temperature">6.63&#176C</h1>
                <div class="weather-information__weather">
                    <img src="images/search-loupe.png" alt="icon of a weather" class="weather-information__weather-img" height="20px" width="20px">
                    <p class="weather-information__weather-description">Broken Clouds</p>
                </div>
                <p class="weather-information__humidity weather-info">Humidity: 81%</p>
                <p class="weather-information__wind-speed weather-info">Wind Speed: 3.6 km/h</p>
            </section>
        </div>
        <script src="js/app.js"></script>
    </body>
</html>
